<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Finance Tracker{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f0f6ff; /* light blue background */
        }

        /* NAVBAR */
        nav {
            background: linear-gradient(90deg, #1e3a8a, #2563eb);
            color: white;
            padding: 12px;
        }

        .navbar-brand {
            font-weight: bold;
            color: white !important;
        }

        nav .btn {
            border-radius: 8px;
            font-size: 14px;
        }

        /* CONTAINER */
        .container {
            padding: 20px;
        }

        /* BUTTON STYLE OVERRIDE */
        .btn-primary {
            background-color: #2563eb;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1e3a8a;
        }

        .btn-secondary {
            background-color: #3b82f6;
            border: none;
        }

        .btn-info {
            background-color: #60a5fa;
            border: none;
            color: white;
        }

        .btn-warning {
            background-color: #93c5fd;
            border: none;
            color: #0f172a;
        }

        .btn-danger {
            background-color: #1e3a8a;
            border: none;
        }

        /* CARDS */
        .card {
            border-radius: 12px;
            border: none;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            nav .btn {
                margin-bottom: 5px;
                width: 100%;
            }

            .container {
                padding: 10px;
            }
        }
    </style>
</head>

<body>

{% if show_nav %}
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">

        <span class="navbar-brand"> Smart Personal Finance Tracker</span>

        <div class="ms-auto d-flex flex-wrap gap-2">

            <a href="{{ url_for('finance.dashboard') }}" class="btn btn-secondary">Dashboard</a>
            <a href="{{ url_for('finance.add_transaction') }}" class="btn btn-primary">Add</a>
            <a href="{{ url_for('finance.transaction_history') }}" class="btn btn-info">History</a>
            <a href="{{ url_for('finance.manage') }}" class="btn btn-warning">Manage</a>
            <a href="{{ url_for('auth.logout') }}" class="btn btn-danger">Logout</a>

        </div>

    </div>
</nav>
{% endif %}

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
